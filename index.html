<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmuNav</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>EmuNav</h1>
        <p>Nintendo DS emulator</p>
    </header>

    <details class="controls-details">
        <summary>Controles</summary>
        <div class="controls-grid">
            <div class="control-group">
                <span class="group-label">D-Pad</span>
                <ul>
                    <li><kbd>▲</kbd> Arriba</li>
                    <li><kbd>▼</kbd> Abajo</li>
                    <li><kbd>◀</kbd> Izquierda</li>
                    <li><kbd>▶</kbd> Derecha</li>
                </ul>
            </div>
            <div class="control-group">
                <span class="group-label">Botones</span>
                <ul>
                    <li><kbd>J</kbd> A &nbsp;<kbd>K</kbd> B</li>
                    <li><kbd>U</kbd> X &nbsp;<kbd>I</kbd> Y</li>
                    <li><kbd>Q</kbd> L &nbsp;<kbd>E</kbd> R</li>
                </ul>
            </div>
            <div class="control-group">
                <span class="group-label">Sistema</span>
                <ul>
                    <li><kbd>Enter</kbd> Start</li>
                    <li><kbd>Shift</kbd> Select</li>
                </ul>
            </div>
        </div>
    </details>

    <div class="game-wrapper">
        <div class="videogame-container" id="gameContainer">
            <iframe class="videogame" id="gameFrame" src="emulator.html"
                    frameborder="0" allowfullscreen tabindex="0"></iframe>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Pantalla completa">
            <svg id="fsIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>
    </div>

    <footer>
        <p>EmuNav — Made by AngelDev2343</p>
    </footer>

    <script>
        /* ── Fullscreen ── */
        const iconExpand = `
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>`;
        const iconCollapse = `
            <polyline points="4 14 10 14 10 20"/>
            <polyline points="20 10 14 10 14 4"/>
            <line x1="10" y1="14" x2="3" y2="21"/>
            <line x1="21" y1="3" x2="14" y2="10"/>`;

        function toggleFullscreen() {
            const container = document.getElementById('gameContainer');
            const icon = document.getElementById('fsIcon');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(() => {});
                icon.innerHTML = iconCollapse;
            } else {
                document.exitFullscreen();
                icon.innerHTML = iconExpand;
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fsIcon').innerHTML = iconExpand;
            }
        });

        /* ── Keyboard input fix ── */
        const GAME_KEYS = new Set([
            'KeyW','KeyA','KeyS','KeyD',        // D-Pad
            'KeyJ','KeyK','KeyU','KeyI',        // A B X Y
            'KeyQ','KeyE',                      // L R
            'Enter','ShiftLeft','ShiftRight'    // Start Select
        ]);

        function forwardKeyEvent(e) {
            const frame = document.getElementById('gameFrame');

            // Si el foco ya está dentro del iframe, el emulador recibe el evento solo
            if (document.activeElement === frame) return;

            if (!GAME_KEYS.has(e.code)) return;

            // Evitar scroll u otros comportamientos del padre
            e.preventDefault();

            try {
                frame.contentWindow.dispatchEvent(
                    new KeyboardEvent(e.type, {
                        key:        e.key,
                        code:       e.code,
                        keyCode:    e.keyCode,
                        which:      e.which,
                        bubbles:    true,
                        cancelable: true,
                        shiftKey:   e.shiftKey,
                        ctrlKey:    e.ctrlKey,
                        altKey:     e.altKey,
                    })
                );
            } catch (err) {
                // Solo ocurre si el iframe fuera cross-origin (no es el caso aquí)
                console.warn('No se pudo redirigir el evento de teclado:', err);
            }
        }

        // capture:true para interceptar antes que cualquier otro listener de la página
        document.addEventListener('keydown', forwardKeyEvent, true);
        document.addEventListener('keyup',   forwardKeyEvent, true);

        // Dar foco al iframe una vez que cargue, así el emulador recibe input directo
        document.getElementById('gameFrame').addEventListener('load', () => {
            document.getElementById('gameFrame').focus();
        });
    </script>
</body>
</html>
